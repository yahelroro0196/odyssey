services:
  worker1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ODYSSEY_LIVE_DOCKER_WORKER_1_PORT}:22"
    volumes:
      - ${ODYSSEY_LIVE_DOCKER_AUTHORIZED_KEY}:/run/odyssey/ssh/authorized_key.pub:ro
      - ${ODYSSEY_LIVE_DOCKER_AUTH_JSON}:/root/.codex/auth.json:ro

  worker2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ODYSSEY_LIVE_DOCKER_WORKER_2_PORT}:22"
    volumes:
      - ${ODYSSEY_LIVE_DOCKER_AUTHORIZED_KEY}:/run/odyssey/ssh/authorized_key.pub:ro
      - ${ODYSSEY_LIVE_DOCKER_AUTH_JSON}:/root/.codex/auth.json:ro
